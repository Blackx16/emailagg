services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: emailagg_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailagg}
      POSTGRES_USER: ${POSTGRES_USER:-emailagg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailagg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emailagg_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Database Migrations ──────────────────────────────────────
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_migration
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - internal
    command: alembic upgrade head
    restart: "no"

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - internal
      - external
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Celery Worker: Email Sync ──────────────────────────────────
  worker_sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_worker_sync
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external  # Required: worker must reach Gmail/Microsoft/IMAP APIs
    command: celery -A app.workers.celery_app worker --loglevel=info -Q sync --concurrency=8 --hostname=worker-sync@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Worker: Telegram Notifications ────────────────────────
  worker_notifications:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_worker_notifications
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external  # Required: Telegram API calls
    command: celery -A app.workers.celery_app worker --loglevel=info -Q notifications --concurrency=4 --hostname=worker-notify@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Worker: SMTP Forwarding ──────────────────────────────
  worker_forwarding:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_worker_forwarding
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external  # Required: SMTP delivery to external servers
    command: celery -A app.workers.celery_app worker --loglevel=info -Q forwarding --concurrency=2 --hostname=worker-fwd@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Worker: Maintenance / Orchestrator ────────────────────
  worker_maintenance:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_worker_maintenance
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    command: celery -A app.workers.celery_app worker --loglevel=info -Q maintenance --concurrency=2 --hostname=worker-maint@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Beat (scheduler) ──────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - beat_schedule:/var/run/celerybeat
    depends_on:
      - redis
    networks:
      - internal
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/var/run/celerybeat/celerybeat-schedule

  # ─── Celery Flower (monitoring UI) ───────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emailagg_flower
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    networks:
      - internal
      - external
    command: celery -A app.workers.celery_app flower --port=5555 --url_prefix=flower --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}

  # ─── Telegram Bot ─────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: emailagg_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    networks:
      - internal
      - external
    command: python -m bot.main

  # ─── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL}
        NEXT_PUBLIC_FRONTEND_URL: ${FRONTEND_URL}
    container_name: emailagg_frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    networks:
      - internal
      - external
    ports:
      - "3000:3000"

  # ─── Mission Control Dashboard ───────────────────────────────
  mission-control:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    container_name: emailagg_mission_control
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-emailagg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-emailagg}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: emailagg_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - external

volumes:
  postgres_data:
  redis_data:
  beat_schedule:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
    internal: true     # no direct internet access for internal services
  external:
    driver: bridge
