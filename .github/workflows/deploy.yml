name: Deploy to Production VPS

# Auto-deploys on push/merge to `main`, but every run is HELD for manual
# approval via the "production" environment (required reviewer: @Blackx16)
# before it is allowed to SSH into the server. Also triggerable by hand.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once; queue them instead of cancelling.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    environment: production          # <-- manual-approval gate lives here
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy (git pull + docker compose up --build)
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              set -e
              cd ~/emailagg
              echo "--- Pulling latest main ---"
              git pull --ff-only origin main
              echo "--- Rebuilding & restarting containers ---"
              docker compose up -d --build
              echo "--- Container status ---"
              docker compose ps
            '
