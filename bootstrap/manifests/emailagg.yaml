# emailagg.yaml
# ─────────────────────────────────────────────────────────────────────────────
# EmailAgg Project Manifest
#
# Defines the complete Confluence page hierarchy, Jira Epics, Components,
# Versions, and Labels for the EmailAgg product.
#
# This manifest is loaded by the Engineering OS bootstrapper and used
# to idempotently initialise the EmailAgg workspace.
# ─────────────────────────────────────────────────────────────────────────────

version: "1.0"
kind: Project

metadata:
  name: EmailAgg
  tagline: "Unified Email Aggregation & Forwarding via Telegram"
  description: >
    EmailAgg is a self-hosted, enterprise-grade Email Aggregation SaaS that
    compiles emails from multiple inboxes (Gmail, Microsoft Outlook, and custom
    IMAP accounts) and delivers instant notifications to a Telegram bot.
    Features direct API email forwarding, smart OTP extraction, and granular
    routing rule scoping.
  owner: "Chandraveer S Solanki"
  github: "https://github.com/Blackx16/emailagg"
  landing_page: "https://Blackx16.github.io/emailagg/"
  status: "Private Beta"
  tech_stack:
    backend: "FastAPI + SQLAlchemy + Alembic"
    workers: "Celery + Redis"
    database: "PostgreSQL"
    frontend: "Next.js"
    bot: "aiogram (Telegram)"
    infra: "Docker Compose + Nginx + Hetzner VPS"

# ─────────────────────────────────────────────────────────────────────────────
# Jira Bootstrap
# ─────────────────────────────────────────────────────────────────────────────
jira:
  project_key: "LAZYA"
  project_name: "EmailAgg"
  assignee_account_id: "712020:f3a98c94-f7ec-4341-b191-fb670a7b0ee5"

  labels:
    - backend
    - frontend
    - infra
    - security
    - worker
    - api
    - bug
    - feature
    - documentation
    - tech-debt
    - beta
    - release

  epics:
    - name: Product
      description: >
        Product vision, roadmap, release planning, business metrics,
        and go-to-market strategy for EmailAgg.
      labels: [product, beta]
      priority: High

    - name: Authentication
      description: >
        OAuth2 flows for Gmail and Microsoft, IMAP credential management,
        token refresh pipelines, and Fernet AES-256 encryption at rest.
      labels: [backend, security]
      priority: Critical

    - name: Email Sync Engine
      description: >
        IMAP polling, IDLE push, Microsoft Graph webhooks, Gmail Pub/Sub,
        sync deduplication, and connection health monitoring.
      labels: [backend, worker]
      priority: Critical

    - name: Email Forwarding Engine
      description: >
        SMTP relay, Google Gmail API send, Microsoft Graph sendMail,
        HTML rewriting for forwarded emails, and granular forwarding rules.
      labels: [backend, worker]
      priority: High

    - name: Mission Control
      description: >
        Real-time internal admin dashboard: system health metrics, user telemetry,
        CPU/storage interval graphs, and operator controls.
      labels: [frontend, infra]
      priority: Medium

    - name: Telegram Bot
      description: >
        aiogram Telegram bot: /start, /connect, /rules, /settings, /disconnect
        commands, and Telegram Mini App (WebApp) integration.
      labels: [backend, api]
      priority: High

    - name: Infrastructure
      description: >
        Docker Compose orchestration, Nginx SSL reverse proxy, Redis configuration,
        Celery Beat scheduler, and Hetzner VPS provisioning.
      labels: [infra, docker]
      priority: High

    - name: Monitoring & Observability
      description: >
        Celery Flower monitoring, log aggregation to Google Drive, health check
        endpoints, and system metrics collection.
      labels: [infra, monitoring]
      priority: Medium

    - name: Security
      description: >
        Security hardening: auth middleware, internal API endpoint protection,
        Nginx proxy blocking, Redis rate limiting, and input sanitisation.
      labels: [security, backend]
      priority: Critical

    - name: Deployment
      description: >
        Production deployment workflow: SSL certificate management, domain
        configuration, Docker build pipeline, and environment secrets management.
      labels: [infra, deploy]
      priority: High

    - name: Documentation
      description: >
        Engineering OS: Confluence page hierarchy, ADRs, runbooks, API docs,
        architecture diagrams, and developer onboarding guides.
      labels: [documentation]
      priority: Medium

    - name: Technical Debt
      description: >
        Known technical debt items, refactoring backlog, code quality improvements,
        and deferred architecture migrations.
      labels: [tech-debt]
      priority: Low

  components:
    - name: Backend
      description: "FastAPI application, REST API routes, and core business logic"
    - name: Frontend
      description: "Next.js dashboard client and Telegram Mini App"
    - name: Worker
      description: "Celery task workers: sync, notify, forward, beat scheduler"
    - name: Infrastructure
      description: "Docker Compose, Nginx, VPS provisioning, and networking"
    - name: Database
      description: "PostgreSQL schema, Alembic migrations, and query optimisation"
    - name: Redis
      description: "Redis configuration, rate limiting, locking, and caching"
    - name: Docker
      description: "Dockerfiles, multi-stage builds, and image management"
    - name: Celery
      description: "Celery configuration, queue routing, and task monitoring"
    - name: Monitoring
      description: "Flower, health endpoints, log backup, and alerting"
    - name: Security
      description: "Auth middleware, Fernet encryption, and security hardening"
    - name: Website
      description: "GitHub Pages landing page"
    - name: Mission Control
      description: "Internal operator dashboard for system monitoring"
    - name: Telegram
      description: "aiogram bot handlers, commands, and WebApp"
    - name: Google API
      description: "Gmail OAuth, Google Drive, and Google REST API integrations"
    - name: Microsoft Graph
      description: "Microsoft OAuth, Outlook API, and Graph API integrations"

  versions:
    - name: "Private Beta"
      description: "Initial private beta — limited user testing"
      released: false
    - name: "Production Beta"
      description: "Public beta — broader user access with known limitations"
      released: false
    - name: "v1.0"
      description: "First stable production release"
      released: false

